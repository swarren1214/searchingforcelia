name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set base path
        run: |
          if [ -n "${PAGES_BASE_PATH:-}" ]; then
            SANITIZED="$(echo "$PAGES_BASE_PATH" | sed 's#^/*##; s#/*$##')"
            if [ -n "$SANITIZED" ]; then
              echo "NEXT_PUBLIC_BASE_PATH=/$SANITIZED" >> "$GITHUB_ENV"
              echo "Using explicit base path /$SANITIZED from PAGES_BASE_PATH"
            else
              echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
              echo "Using root base path from PAGES_BASE_PATH override"
            fi
          elif [ -f "public/CNAME" ]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
            echo "Using root base path because public/CNAME exists"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
              echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
              echo "Using root base path"
            else
              echo "NEXT_PUBLIC_BASE_PATH=/$REPO_NAME" >> "$GITHUB_ENV"
              echo "Using project base path /$REPO_NAME"
            fi
          fi

      - name: Media guard check
        run: npm run media:check

      - name: Build static site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
